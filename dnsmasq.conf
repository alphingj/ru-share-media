# dnsmasq configuration for Zerotier network
# Place at /etc/dnsmasq.conf or use with Docker container

# Zerotier network subnet
domain-needed
bogus-priv

# Local domain for Zerotier devices
local=/zerotier.local/
domain=zerotier.local

# Device hostnames and their Zerotier IPs
address=/media-server/10.147.17.2
address=/nas/10.147.17.3
address=/laptop/10.147.17.4
address=/phone/10.147.17.5

# Wildcard for any device
address=/zt/10.147.17.1

# Reverse DNS for Zerotier subnet
ptr-address=2.17.147.10.in-addr.arpa
ptr-address=3.17.147.10.in-addr.arpa
ptr-address=4.17.147.10.in-addr.arpa
ptr-address=5.17.147.10.in-addr.arpa

# DNS server for Zerotier clients
# Set this in Zerotier Central -> Network -> DNS Servers
# 10.147.17.1