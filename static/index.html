<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ru-share Media</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            netflix: {
              red: '#E50914',
              dark: '#141414',
              'dark-gray': '#2F2F2F',
              'light-gray': '#737373',
            }
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="bg-black text-white min-h-screen">
  <nav class="flex items-center justify-between px-6 py-4 bg-black/80 backdrop-blur-sm fixed top-0 w-full z-50">
    <div class="flex items-center space-x-8">
      <h1 class="text-2xl font-bold text-netflix-red">ru-share</h1>
      <div class="hidden md:flex space-x-4">
        <a href="#" class="hover:text-netflix-red transition">Home</a>
        <a href="#" class="hover:text-netflix-red transition">TV Shows</a>
        <a href="#" class="hover:text-netflix-red transition">Movies</a>
        <a href="#" class="hover:text-netflix-red transition">My List</a>
      </div>
    </div>
    <div class="flex items-center space-x-4">
      <input type="text" placeholder="Search..." class="bg-netflix-dark-gray rounded px-3 py-1 text-sm focus:outline-none focus:ring-1 focus:ring-netflix-red">
      <button id="login-btn" class="bg-netflix-red px-4 py-1 rounded text-sm font-medium">Login</button>
    </div>
  </nav>

  <main class="pt-20">
    <section class="relative h-96 mb-8 rounded-b-lg overflow-hidden">
      <div class="absolute inset-0 bg-gradient-to-r from-black/70 via-black/30 to-transparent z-10"></div>
      <img src="https://source.unsplash.com/random/1920x1080/?movie" alt="Featured" class="w-full h-full object-cover">
      <div class="absolute bottom-20 left-12 z-20 max-w-lg">
        <h2 class="text-5xl font-bold mb-4">Featured Content</h2>
        <p class="text-netflix-light-gray mb-6">Your featured media content goes here. This is the hero banner.</p>
        <button class="bg-white text-black px-6 py-2 rounded font-bold mr-2 hover:bg-netflix-light-gray transition">▶ Play</button>
        <button class="bg-netflix-dark-gray text-white px-6 py-2 rounded font-bold hover:bg-netflix-light-gray transition">ℹ More Info</button>
      </div>
    </section>

    <section class="px-6 mb-8">
      <h3 class="text-xl font-semibold mb-4">Continue Watching</h3>
      <div id="continue-watching" class="flex space-x-4 overflow-x-auto pb-4 scrollbar-hide">
        <div class="flex-shrink-0 w-48 cursor-pointer group">
          <div class="relative rounded-md overflow-hidden">
            <img src="https://placehold.co/300x170/netflix-dark-gray/white?text=Continue" alt="Placeholder" class="w-full h-28 object-cover transition duration-300 group-hover:scale-105">
            <div class="mt-2">
              <p class="font-medium truncate">Movie Title</p>
              <div class="w-full bg-gray-700 h-1 mt-1">
                <div class="bg-netflix-red h-1 w-1/3"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section class="px-6 mb-8">
      <h3 class="text-xl font-semibold mb-4">Popular on ru-share</h3>
      <div class="grid grid-cols-2 sm:grid-cols-4 md:grid-cols-6 gap-4" id="popular-list">
      </div>
    </section>

    <section class="px-6 mb-8">
      <h3 class="text-xl font-semibold mb-4">Recently Added</h3>
      <div class="flex space-x-4 overflow-x-auto pb-4 scrollbar-hide" id="recent-list">
      </div>
    </section>
  </main>

  <div id="modal" class="hidden fixed inset-0 bg-black/80 z-50 items-center justify-center">
    <div class="relative max-w-4xl w-full mx-4">
      <button id="close-modal" class="absolute top-4 right-4 text-white text-2xl hover:text-netflix-red">&times;</button>
      <div class="aspect-video bg-netflix-dark rounded-lg flex items-center justify-center">
        <p class="text-netflix-light-gray">Video Player Placeholder</p>
      </div>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
