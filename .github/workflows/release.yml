name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (for manual runs, e.g. v3.0.1)'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            name: ru-share-media-x86_64-linux
            cross: false
          - target: x86_64-unknown-linux-musl
            name: ru-share-media-x86_64-musl-linux
            cross: false
          - target: i686-unknown-linux-gnu
            name: ru-share-media-x86-linux
            cross: true
          - target: aarch64-unknown-linux-gnu
            name: ru-share-media-aarch64-linux
            cross: true
          - target: armv7-unknown-linux-gnueabihf
            name: ru-share-media-armv7-linux
            cross: true
          - target: armv7-unknown-linux-musleabihf
            name: ru-share-media-armv7-musl-linux
            cross: true
          - target: arm-unknown-linux-gnueabihf
            name: ru-share-media-armv6-linux
            cross: true
          - target: arm-unknown-linux-musleabihf
            name: ru-share-media-armv6-musl-linux
            cross: true

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          components: rustfmt, clippy

      - name: Install target
        run: rustup target add ${{ matrix.target }}

      - name: Install cross tool
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Build release (native cargo)
        if: ${{ !matrix.cross }}
        env:
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER: musl-gcc
        run: |
          BUILD_DIR=target-release
          mkdir -p "$BUILD_DIR"
          cargo build --release --target ${{ matrix.target }}
          cp target/${{ matrix.target }}/release/ru-share-media "$BUILD_DIR/${{ matrix.name }}"

      - name: Build release (cross)
        if: matrix.cross
        run: |
          BUILD_DIR=target-release
          mkdir -p "$BUILD_DIR"
          cross build --release --target ${{ matrix.target }}
          cp target/${{ matrix.target }}/release/ru-share-media "$BUILD_DIR/${{ matrix.name }}"

      - name: Compute checksums
        run: |
          cd target-release
          sha256sum * > checksums.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: target-release/${{ matrix.name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          for dir in artifacts/*/; do
            cp "$dir"/* release-assets/ 2>/dev/null || true
          done
          ls -la release-assets

      - name: Get release date
        id: date
        run: echo "date=$(date +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Create or update GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${RELEASE_TAG}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "ru-share-media $TAG" \
              --notes "Release $TAG - multi-arch\n\nBuilt for: x86_64 (gnu/musl), x86, aarch64, armv7 (gnu/musl), armv6 (gnu/musl)"
            gh release upload "$TAG" release-assets/* --clobber
          else
            gh release create "$TAG" \
              --title "ru-share-media $TAG" \
              --notes "Release $TAG - multi-arch\n\nBuilt for: x86_64 (gnu/musl), x86, aarch64, armv7 (gnu/musl), armv6 (gnu/musl)" \
              release-assets/*
          fi
