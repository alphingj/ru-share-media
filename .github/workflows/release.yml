name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            name: ru-share-media-x86_64-linux
            cross: false
          - target: aarch64-unknown-linux-musl
            name: ru-share-media-aarch64-linux
            cross: false
          - target: armv7-unknown-linux-musleabihf
            name: ru-share-media-armv7-linux
            cross: true
          - target: arm-unknown-linux-gnueabihf
            name: ru-share-media-armv6-linux
            cross: true

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          components: rustfmt, clippy

      - name: Install target
        run: rustup target add ${{ matrix.target }}

      - name: Install ARM toolchain
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-linux-gnueabihf gcc-aarch64-linux-gnu musl-tools musl-dev

      - name: Build release
        run: |
          BUILD_DIR=target-release
          mkdir -p "$BUILD_DIR"
          cargo build --release --target ${{ matrix.target }}
          cp target/${{ matrix.target }}/release/ru-share-media "$BUILD_DIR/${{ matrix.name }}"

      - name: Compute checksums
        run: |
          cd target-release
          sha256sum * > checksums.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: target-release/${{ matrix.name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          for dir in artifacts/*/; do
            cp "$dir"/* release-assets/ 2>/dev/null || true
          done
          ls -la release-assets

      - name: Get release date
        id: date
        run: echo "date=$(date +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Create or update GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v3.0.1"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "ru-share-media $TAG" \
              --notes "Release $TAG - multi-arch\n\nBuilt for: x86_64, aarch64, armv7, armv6"
            gh release upload "$TAG" release-assets/* --clobber
          else
            gh release create "$TAG" \
              --title "ru-share-media $TAG" \
              --notes "Release $TAG - multi-arch\n\nBuilt for: x86_64, aarch64, armv7, armv6" \
              release-assets/*
          fi