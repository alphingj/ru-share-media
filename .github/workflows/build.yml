name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - { name: x86_64-linux, rust: x86_64-unknown-linux-gnu, binary: ru-share-media-x86_64-linux }
          - { name: aarch64-linux, rust: aarch64-unknown-linux-gnu, binary: ru-share-media-aarch64-linux }
          - { name: armv7-linux, rust: armv7-unknown-linux-gnueabihf, binary: ru-share-media-armv7-linux }
          - { name: armv6-musl, rust: armv6-unknown-linux-gnueabihf, binary: ru-share-media-armv6-musl-linux }

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target.rust }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target.rust }}

      - name: Package
        run: |
          mv target/${{ matrix.target.rust }}/release/ru-share-media target/${{ matrix.target.rust }}/release/${{ matrix.target.binary }}
          tar -czf ${{ matrix.target.binary }}.tar.gz -C target/${{ matrix.target.rust }}/release ${{ matrix.target.binary }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target.binary }}
          path: ${{ matrix.target.binary }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*.tar.gz
          name: Release ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}