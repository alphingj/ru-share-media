site_name: ru-share-media Documentation
site_url: https://alphingj.github.io/ru-share-media/
repo_url: https://github.com/alphingj/ru-share-media
repo_name: alphingj/ru-share-media

nav:
  - Home: index.md
  - Installation:
      - From Releases: installation/releases.md
      - From Source: installation/source.md
      - Docker: installation/docker.md
  - Configuration:
      - Environment Variables: configuration/env.md
      - CORS: configuration/cors.md
  - Zerotier Setup:
      - Overview: zerotier/overview.md
      - Quick Reference: zerotier/quickref.md
      - Docker: zerotier/docker.md
      - Systemd: zerotier/systemd.md
  - API Reference: api.md

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
    - scheme: slate
      primary: indigo
      accent: indigo
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - search.highlight
    - search.share

markdown_extensions:
  - admonition
  - codehilite
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.tabbed
  - pymdownx.details

plugins:
  - search
  - git-revision-date-localized:
      enable_creation_date: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/alphingj/ru-share-media